name: Build Android Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Install Android SDK 36
        shell: bash
        run: |
          SDKMANAGER="${ANDROID_SDK_ROOT:-$ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses > /dev/null || true
          "$SDKMANAGER" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Install NPM dependencies
        run: npm ci

      - name: Verify Capacitor versions
        shell: bash
        run: |
          node <<'NODE'
          const packages = [
            "@capacitor/core",
            "@capacitor/cli",
            "@capacitor/android",
          ];

          const versions = Object.fromEntries(
            packages.map((name) => [
              name,
              require(`${name}/package.json`).version,
            ]),
          );

          console.log(versions);

          const uniqueVersions = new Set(Object.values(versions));
          if (uniqueVersions.size !== 1) {
            console.error("Capacitor package versions must be identical.");
            process.exit(1);
          }
          NODE

      - name: Repair Android Gradle configuration
        shell: bash
        run: |
          cat > android/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat > android/settings.gradle <<'EOF'
          include ':app'

          include ':capacitor-cordova-android-plugins'
          project(':capacitor-cordova-android-plugins').projectDir =
              new File('./capacitor-cordova-android-plugins/')

          apply from: 'capacitor.settings.gradle'
          EOF

          cat > android/build.gradle <<'EOF'
          // Top-level build file for Capacitor 8.4.1.
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.13.0'
                  classpath 'com.google.gms:google-services:4.4.4'
              }
          }

          apply from: "variables.gradle"

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          task clean(type: Delete) {
              delete rootProject.buildDir
          }
          EOF

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Verify generated Capacitor files
        shell: bash
        run: |
          test -f android/capacitor.settings.gradle
          test -f android/app/capacitor.build.gradle
          test -d node_modules/@capacitor/android/capacitor

          grep -q "include ':capacitor-android'" \
            android/capacitor.settings.gradle

          grep -q "JavaVersion.VERSION_21" \
            android/app/capacitor.build.gradle

          echo "Java version:"
          java -version

          echo "Capacitor settings:"
          cat android/capacitor.settings.gradle

      # =======================================================
      # مراحل اصلاح شده برای ساخت نسخه رسمی (با استفاده از ENV)
      # =======================================================

      - name: Decode Keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | tr -d '\n\r ' | base64 --decode > $RUNNER_TEMP/filmtrack.keystore
          # بررسی اینکه فایل درست ساخته شده است
          if [ ! -s "$RUNNER_TEMP/filmtrack.keystore" ]; then
            echo "Error: Keystore file is empty or invalid!"
            exit 1
          fi

      - name: Grant execute permission to Gradle Wrapper
        run: chmod +x android/gradlew

      - name: Build Signed Release APK
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/filmtrack.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew clean assembleRelease --no-daemon -x lint --stacktrace -Pandroid.injected.signing.store.file=$KEYSTORE_PATH -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD -Pandroid.injected.signing.key.alias=$KEY_ALIAS -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Verify APK
        shell: bash
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"

          if [ ! -f "$APK_PATH" ]; then
            echo "::error::Release APK was not generated at $APK_PATH"
            find android/app/build/outputs -type f -print 2>/dev/null || true
            exit 1
          fi

          ls -lh "$APK_PATH"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: FilmTrack-Release-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30