```yaml
name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install NPM dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Ensure Capacitor Android is installed
        shell: bash
        run: |
          if node -e "require.resolve('@capacitor/android/package.json')" 2>/dev/null; then
            echo "@capacitor/android is installed."
          else
            echo "@capacitor/android is missing. Installing the version matching @capacitor/core..."

            CAPACITOR_VERSION=$(node -p "require('./node_modules/@capacitor/core/package.json').version")

            echo "Capacitor version: $CAPACITOR_VERSION"

            npm install --no-save "@capacitor/android@$CAPACITOR_VERSION"
          fi

      - name: Build web application
        run: npm run build --if-present

      - name: Regenerate Capacitor Android settings
        shell: bash
        run: |
          rm -f android/capacitor.settings.gradle
          npx cap sync android

      - name: Verify Capacitor Android configuration
        shell: bash
        run: |
          if [ ! -f android/capacitor.settings.gradle ]; then
            echo "::error::android/capacitor.settings.gradle was not generated."
            exit 1
          fi

          if ! grep -q "capacitor-android" android/capacitor.settings.gradle; then
            echo "::error:::capacitor-android is not registered in android/capacitor.settings.gradle."
            echo "Generated file contents:"
            cat android/capacitor.settings.gradle
            exit 1
          fi

          echo "Capacitor Android configuration is valid."
          cat android/capacitor.settings.gradle

      - name: Grant execute permission to Gradle Wrapper
        run: chmod +x android/gradlew

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew clean assembleDebug --no-daemon -x lint --stacktrace

      - name: Verify generated APK
        shell: bash
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"

          if [ ! -f "$APK_PATH" ]; then
            echo "::error::APK file was not generated at $APK_PATH"
            find android/app/build/outputs -type f 2>/dev/null || true
            exit 1
          fi

          echo "APK generated successfully:"
          ls -lh "$APK_PATH"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FilmTrack-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
```
