name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install NPM dependencies
      run: npm install

    - name: Copy Web Assets to Android
      run: npx cap copy android

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.14.3'

    - name: Clean Gradle Configs (Allow Capacitor flatDir)
      run: |
        # تنظیمات پایه
        echo "sdk.dir=$ANDROID_HOME" > ./android/local.properties
        echo "android.useAndroidX=true" > ./android/gradle.properties
        echo "android.enableJetifier=true" >> ./android/gradle.properties
        
        # بازنویسی settings.gradle
        cat << 'EOF' > ./android/settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "FilmTrack"
        include ':app'
        EOF

        # بازنویسی variables.gradle
        cat << 'EOF' > ./android/variables.gradle
        ext {
            minSdkVersion = 22
            compileSdkVersion = 34
            targetSdkVersion = 34
            androidxAppCompatVersion = "1.6.1"
            androidxCoreVersion = "1.10.0"
            androidxMaterialVersion = "1.9.0"
            androidxBrowserVersion = "1.5.0"
            androidxLocalbroadcastmanagerVersion = "1.0.0"
            firebaseMessagingVersion = "23.0.0"
            playServicesLocationVersion = "21.0.1"
            junitVersion = "4.13.2"
            androidxJunitVersion = "1.1.5"
            androidxEspressoCoreVersion = "3.5.1"
            cordovaAndroidVersion = "10.1.1"
        }
        EOF

        # بازنویسی build.gradle (حذف allprojects)
        cat << 'EOF' > ./android/build.gradle
        // Top-level build file
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.0.0'
            }
        }
        apply from: 'variables.gradle'
        task clean(type: Delete) {
            delete rootProject.buildDir
        }
        EOF

    - name: Grant execute permission for gradlew
      run: chmod +x ./android/gradlew

    - name: Build Debug APK
      working-directory: ./android
      run: gradle assembleDebug --no-daemon -x lint

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: FilmTrack-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
