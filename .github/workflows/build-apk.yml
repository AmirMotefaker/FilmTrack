name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install NPM dependencies
      run: npm install

    - name: Copy Web Assets to Android
      run: npx cap copy android

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.14.3'

    - name: Clean Gradle Configs (Remove Aliyun Mirrors & Proxies)
      run: |
        echo "" > ./android/gradle.properties
        echo "sdk.dir=$ANDROID_HOME" > ./android/local.properties
        
        cat << 'EOF' > ./android/settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "FilmTrack"
        include ':app'
        EOF

        cat << 'EOF' > ./android/build.gradle
        // Top-level build file
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.0.0'
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        task clean(type: Delete) {
            delete rootProject.buildDir
        }
        EOF

    - name: Grant execute permission for gradlew
      run: chmod +x ./android/gradlew

    - name: Build Debug APK
      working-directory: ./android
      run: gradle assembleDebug --no-daemon -x lint

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: FilmTrack-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
