name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install NPM dependencies
      run: npm install

    - name: Sync Capacitor Android
      run: npx cap sync android

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.7'

    - name: Sanitize Android Configs (Remove Local Proxies & Mirrors)
      run: |
        # ۱. پاک کردن کامل پروکسی‌های محلی از gradle.properties
        cat << 'EOF' > ./android/gradle.properties
        android.useAndroidX=true
        android.enableJetifier=true
        org.gradle.jvmargs=-Xmx1536m
        EOF

        # ۲. بازنویسی build.gradle (حذف آلیون، حفظ variables.gradle برای کاپاسیتور)
        cat << 'EOF' > ./android/build.gradle
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.0.0'
            }
        }
        apply from: 'variables.gradle'
        task clean(type: Delete) {
            delete rootProject.buildDir
        }
        EOF

        # ۳. رفع مشکل مخزن flatDir کاپاسیتور
        sed -i 's/FAIL_ON_PROJECT_REPOS/PREFER_SETTINGS/g' ./android/settings.gradle

    - name: Grant execute permission for gradlew
      run: chmod +x ./android/gradlew

    - name: Build Debug APK
      working-directory: ./android
      run: gradle assembleDebug --no-daemon -x lint

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: FilmTrack-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
